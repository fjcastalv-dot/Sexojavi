<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestros de la Luz - Los Mejores Fotógrafos</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: #ff4757;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent-color);
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 60px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .profile-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .profile-header h2 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--accent-color);
        }

        .profile-header .specialty {
            font-style: italic;
            color: var(--text-secondary);
        }

        .bio {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #dddddd;
        }

        .gallery-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .photo-item {
            position: relative;
            background-color: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            aspect-ratio: 3 / 2;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .photo-item:hover {
            transform: scale(1.04);
            border-color: var(--accent-color);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-item span {
            font-size: 0.85rem;
            text-align: center;
            padding: 10px;
            color: var(--text-secondary);
        }

        /* --- CAPA FLOTANTE PREMIUM CON DIFUMINADO --- */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.82); /* Fondo oscuro semitransparente */
            backdrop-filter: blur(18px); /* Difuminado de fondo más elegante */
            -webkit-backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out; 
            cursor: zoom-out;
        }

        /* Estado activo */
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* CORRECCIÓN ESTÉTICA DE LA IMAGEN EN GRANDE */
        .lightbox-overlay img {
            max-width: 85vw;  /* Evita que se estire feo a lo ancho */
            max-height: 85vh; /* Evita que se estire feo a lo alto */
            width: auto;      /* Conserva su proporción real */
            height: auto;     /* Conserva su proporción real */
            object-fit: contain;
            border: 3px solid rgba(255, 255, 255, 0.08); /* Bordecito elegante */
            border-radius: 6px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.85); /* Sombra dramática de galería */
        }

        .social-media {
            display: flex;
            gap: 15px;
            align-items: center;
            background-color: #151515;
            padding: 15px;
            border-radius: 6px;
        }

        .social-media span {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .social-link {
            color: #fff;
